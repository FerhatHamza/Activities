<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>إعلان طبيب أخصائي في الطب الداخلي | بعيليش | 09 جوان 2026</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 30%, #fefce8 70%, #fff1f2 100%);
            background-attachment: fixed;
        }

        .announcement-card {
            max-width: 650px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(16, 185, 129, 0.2);
            animation: floatIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* top accent bar */
        .accent-bar {
            height: 10px;
            background: linear-gradient(90deg, #059669, #10b981, #f59e0b, #f43f5e);
            border-radius: 2rem 2rem 0 0;
        }

        .card-content {
            padding: 2rem 2rem 2.5rem;
        }

        .official-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .ministry-tag {
            background: #065f46;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .main-title {
            text-align: center;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 900;
            color: #065f46;
            line-height: 1.3;
            margin-bottom: 0.6rem;
        }

        .highlight {
            color: #f59e0b;
            background: linear-gradient(to right, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doctor-icon {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0 0.5rem;
        }

        .icon-circle {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            box-shadow: 0 15px 30px rgba(5, 150, 105, 0.3);
            position: relative;
        }

        .icon-circle::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px dashed #f59e0b;
            opacity: 0.7;
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.8rem 0 1.5rem;
        }

        .info-box {
            background: #f0fdfa;
            border: 1px solid #a7f3d0;
            border-radius: 1rem;
            padding: 1rem 0.8rem;
            text-align: center;
            transition: all 0.2s;
        }

        .info-box:hover {
            background: #d1fae5;
            border-color: #6ee7b7;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.1);
        }

        .info-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #047857;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 800;
            color: #064e3b;
        }

        .date-highlight {
            background: #fef3c7;
            border-color: #fbbf24;
            grid-column: span 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-announce {
            display: block;
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.35);
            letter-spacing: 0.03em;
            margin-top: 0.5rem;
        }

        .btn-announce:hover {
            background: linear-gradient(135deg, #e11d48, #be123c);
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(244, 63, 94, 0.45);
        }

        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #475569;
            margin-top: 1.2rem;
            font-weight: 500;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(16, 185, 129, 0);
            }
        }

        @media (max-width: 500px) {
            .card-content {
                padding: 1.5rem 1.2rem;
            }
            .info-grid {
                grid-template-columns: 1fr;
                gap: 0.7rem;
            }
            .date-highlight {
                grid-column: span 1;
            }
            .icon-circle {
                width: 75px;
                height: 75px;
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="announcement-card">
        <div class="accent-bar"></div>
        <div class="card-content">
            <div class="official-badge">
                <span class="ministry-tag">⚕️ وزارة الصحة</span>
                <span class="ministry-tag" style="background:#f59e0b;">المؤسسة العمومية للصحة الجوارية</span>
            </div>

            <h1 class="main-title">
                إعلان <span class="highlight">طبيب أخصائي</span>
            </h1>
            <p style="text-align:center; font-weight:700; color:#0f766e; font-size:1.1rem;">
                في الطب الداخلي
            </p>

            <div class="doctor-icon">
                <div class="icon-circle pulse">🩺</div>
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">📍 المكان</div>
                    <div class="info-value">بعيليش</div>
                </div>
                <div class="info-box">
                    <div class="info-label">📅 التاريخ</div>
                    <div class="info-value">الثلاثاء 09 جوان 2026</div>
                </div>
                <div class="info-box date-highlight">
                    <span style="font-size:1.5rem;">⏳</span>
                    <div>
                        <div class="info-label">الموعد</div>
                        <div class="info-value" style="color:#b45309;">غداً – يوم واحد فقط</div>
                    </div>
                </div>
            </div>

            <div style="text-align:center; font-weight:600; color:#334155; font-size:0.95rem; margin-bottom:0.8rem;">
                🩻 فحوصات متخصصة في الطب الداخلي
            </div>

            <button class="btn-announce" onclick="alert('الرجاء الحضور إلى عيادة بعيليش غداً صباحاً.\nلمزيد من المعلومات، اتصل بالمؤسسة.')">
                تأكيد الحضور / استفسار
            </button>

            <div class="footer-note">
                📞 للحجز والاستعلام يرجى الاتصال بالمصالح الصحية المحلية
            </div>
            <div style="text-align:center; margin-top:0.8rem; font-size:0.7rem; color:#94a3b8;">
                المؤسسة العمومية للصحة الجوارية – بريان
            </div>
        </div>
    </div>
</body>
</html>
