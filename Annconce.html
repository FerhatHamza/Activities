<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مخطط الأطباء الأخصائيين - جوان 2026</title>
    
    <!-- استدعاء خط التاجوال المعتمد -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-teal: #008f6b;
            --secondary-navy: #002b49;
            --text-dark: #0f172a; 
            --text-muted: #64748b;
            --bg-canvas: #f8fafc;
        }

        /* حماية ومنع النسخ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none !important;
            user-select: none !important;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #cbd5e1; /* خلفية رمادية لإبراز اللوحة المربعة */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* اللوحة الإعلانية المربعة الثابتة والأبعاد المطلوبة بدقة */
        .square-poster {
            width: 1200px;
            height: 1200px;
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 90px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* شريط علوي بسيط يمثل الهوية البصرية للمؤسسة */
        .top-stripe {
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 12px;
            background: linear-gradient(90deg, var(--primary-teal), var(--secondary-navy));
        }

        /* العناوين الرئيسية - تركيز كامل واختصار بالتفاصيل */
        .header-content {
            text-align: center;
            width: 100%;
            margin-top: 20px;
        }

        .institution-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-teal);
            letter-spacing: 0.5px;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 3.4rem;
            font-weight: 900;
            color: var(--secondary-navy);
            line-height: 1.2;
        }

        .sub-title {
            font-size: 1.8rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .date-highlight {
            background-color: #e6f7f3;
            color: #00664d;
            padding: 4px 20px;
            border-radius: 50px;
            border: 2px solid var(--primary-teal);
            font-weight: 900;
        }

        /* قسم الـ QR Code - نظيف ومميز بمركز اللوحة */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -30px;
        }

        .qr-frame {
            background: #ffffff;
            padding: 35px;
            border-radius: 30px;
            border: 4px solid #f1f5f9;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .qr-frame img {
            width: 420px; /* حجم مثالي وواضح جداً للمسح من مسافة */
            height: 420px;
            object-fit: contain;
            display: block;
        }

        /* رسالة الحث على اتخاذ إجراء (Call to Action) */
        .cta-message {
            margin-top: 40px;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--secondary-navy);
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8fafc;
            padding: 15px 40px;
            border-radius: 20px;
            border: 2px dashed #cbd5e1;
        }

        .cta-message i {
            color: var(--primary-teal);
            font-size: 2rem;
        }

        /* الفوتر السفلي البسيط */
        .footer-area {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #f1f5f9;
            padding-top: 30px;
        }

        .footer-tag {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--secondary-navy);
        }

        .signature-tag {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 700;
            direction: ltr;
        }

        .signature-tag span {
            color: var(--primary-teal);
            font-weight: 900;
        }
    </style>
</head>
<body>

    <!-- اللوحة الإعلانية المربعة الثابتة -->
    <div class="square-poster">
        <div class="top-stripe"></div>
        
        <!-- الهيدر والعناوين الأساسية -->
        <div class="header-content">
            <div class="institution-name">المؤسسة العمومية للصحة الجوارية ببريان • EPSP Berriane</div>
            <h1 class="main-title">مخطط توزيع الأطباء الأخصائيين</h1>
            <div class="sub-title">
                <span>برنامج الفحوصات الطبية المتخصصة لشهر:</span>
                <span class="date-highlight">جوان 2026</span>
            </div>
        </div>

        <!-- مركز التصميم: الـ QR الكود والحث على المسح -->
        <div class="qr-section">
            <div class="qr-frame">
                <!-- تم ربط الصورة البرمجية بملف الـ QR المرفق مباشرة للظهور بشكل نظيف -->
                <img src="image_f0dac7.png" alt="QR Code Planning">
            </div>
            <div class="cta-message">
                <i class="fa-solid fa-camera"></i>
                <span>امسح الرمز  (Scan) للإطلاع على قائمة المواعيد كاملة</span>
            </div>
        </div>

        <!-- الفوتر البسيط جداً للهوية والتوثيق -->
        <div class="footer-area">
            <div class="footer-tag">
                CIES EPSP Berriane
            </div>
            <div class="signature-tag">
                Dev. <span>Ferhat H.</span>
            </div>
        </div>
    </div>

</body>
</html>
