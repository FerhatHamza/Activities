<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - EPSP Berriane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-6 font-['Tajawal']">

    <div class="max-w-4xl mx-auto space-y-8">
        <div class="flex justify-between items-end border-b-4 border-blue-600 pb-2">
            <h1 class="text-3xl font-bold text-blue-900">Tableau de Bord Administrateur</h1>
            <p class="text-sm font-bold text-gray-500">Dev. Ing. Ferhat H.</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-indigo-500">
            <h2 class="text-xl font-bold mb-4 text-indigo-900">1. Ajouter une Polyclinique</h2>
            <div class="flex flex-wrap gap-4">
                <input id="poly-name" placeholder="Nom (Ex: Polyclinique Bailich Mazouz)" class="flex-grow p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-indigo-200">
                <select id="poly-type" class="p-3 bg-gray-50 rounded-xl outline-none">
                    <option value="24/24h">Régime 24/24h</option>
                    <option value="12/24h">Régime 12/24h</option>
                </select>
                <button onclick="addPoly()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 rounded-xl font-bold transition-all">Créer la structure</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-green-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-green-900">2. Affecter Personnel & Générer Codes</h2>
                <button onclick="loadPolys()" class="text-sm bg-gray-100 px-3 py-1 rounded hover:bg-gray-200">Actualiser les structures</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-gray-500">NOM COMPLET</label>
                    <input id="user-name" placeholder="Ex: ZAIDI Mokhtar" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-green-200 mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">CODE SECRET (Identifiant de connexion)</label>
                    <div class="flex gap-2 mt-1">
                        <input id="user-code" placeholder="Ex: 8492" class="w-full p-3 bg-gray-50 rounded-xl outline-none font-mono text-lg font-bold tracking-widest">
                        <button onclick="generateCode()" class="bg-gray-200 px-4 rounded-xl font-bold hover:bg-gray-300">Générer</button>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">STRUCTURE D'AFFECTATION</label>
                    <select id="select-poly" class="w-full p-3 bg-gray-50 rounded-xl mt-1 outline-none">
                        <option value="">Chargement...</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">RÔLE / FONCTION</label>
                    <select id="user-role" class="w-full p-3 bg-gray-50 rounded-xl mt-1 outline-none">
                        <option value="Médecin Chef">Médecin Chef (Polyclinique)</option>
                        <option value="Chef Laboratoire">Chef Laboratoire</option>
                        <option value="Chef Radiologie">Chef Radiologie</option>
                    </select>
                </div>
            </div>
            <button onclick="addUser()" class="mt-6 w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-lg">
                Enregistrer l'utilisateur
            </button>
        </div>
    </div>

    <script>
        // Mettre l'URL de votre worker ici si admin.html n'est pas hébergé au même endroit
        const API_URL = ""; 

        function generateCode() {
            document.getElementById('user-code').value = Math.floor(1000 + Math.random() * 9000).toString();
        }

        async function loadPolys() {
            const res = await fetch(API_URL + '/api/admin/poly');
            const polys = await res.json();
            const select = document.getElementById('select-poly');
            select.innerHTML = polys.map(p => `<option value="${p.id}">${p.nom} (${p.type})</option>`).join('');
        }

        async function addPoly() {
            const nom = document.getElementById('poly-name').value;
            const type = document.getElementById('poly-type').value;
            if(!nom) return alert("Le nom est requis");

            await fetch(API_URL + '/api/admin/poly', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nom, type })
            });
            alert("Structure ajoutée !");
            document.getElementById('poly-name').value = '';
            loadPolys();
        }

        async function addUser() {
            const name = document.getElementById('user-name').value;
            const code = document.getElementById('user-code').value;
            const poly_id = document.getElementById('select-poly').value;
            const role = document.getElementById('user-role').value;

            if(!name || !code || !poly_id) return alert("Veuillez remplir tous les champs");

            const res = await fetch(API_URL + '/api/admin/user', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, code, poly_id, role })
            });
            
            if(res.ok) {
                alert(`Utilisateur enregistré !\nNom: ${name}\nCode: ${code}`);
                document.getElementById('user-name').value = '';
                document.getElementById('user-code').value = '';
            } else {
                alert("Erreur (Ce code existe peut-être déjà).");
            }
        }

        // Charger les polycliniques au démarrage
        window.onload = loadPolys;
    </script>
</body>
</html>
