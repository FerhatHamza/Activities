        :root {
            --primary-teal: #008f6b;
            --secondary-navy: #002b49;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --accent-gold: #c29b2e;
        }

        /* --- FRONTEND PROTECTION CSS --- */
        html, body {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding: 2.5rem 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* --- OFFICIAL CENTERED HEADER (Logo on the Right) --- */
        .official-header {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 2rem;
        }

        .header-meta {
            display: flex;
            flex-direction: row; /* Aligns Logo on the right naturally in RTL */
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
        }

        .logo-wrapper img {
            height: 95px;
            width: auto;
            object-fit: contain;
        }

        .ministry-text {
            text-align: right;
            border-right: 4px solid var(--primary-teal);
            padding-right: 1.2rem;
        }

        .ministry-text h3 {
            font-size: 1.25rem;
            color: var(--secondary-navy);
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .ministry-text p {
            font-size: 0.95rem;
            color: var(--text-dark);
            font-weight: 700;
        }

        .header-title-area {
            width: 100%;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--secondary-navy);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .french-title {
            display: block;
            font-size: 1.3rem;
            color: var(--text-light);
            font-weight: 600;
            margin-top: 0.2rem;
            direction: ltr;
        }

        .sub-title {
            font-size: 1.05rem;
            color: var(--text-dark);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.2rem;
        }

        .sub-title p {
            background: #e6f4f0;
            padding: 0.2rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            color: var(--primary-teal);
        }
