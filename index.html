<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPSP Berriane - Saisie d'Activité</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; } .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); } </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-blue-800 text-white p-6 shadow-xl rounded-b-[2.5rem]">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div><h1 class="text-xl font-bold">EPSP Berriane</h1><p class="text-xs opacity-75">Système de Rapport Médical</p></div>
            <div class="bg-white p-1 rounded-full shadow-md w-14 h-14 flex items-center justify-center">
                <img src="IMG_6185.jpeg" alt="Logo" class="w-12 h-12 object-contain rounded-full">
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-md mx-auto w-full p-4">
        <section id="auth-section" class="mt-10 glass p-8 rounded-3xl shadow-2xl">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Accès Superviseur</h2>
            <input type="password" id="user-code" class="w-full p-4 rounded-2xl border-2 text-center text-2xl tracking-[1em] outline-none focus:border-blue-500" placeholder="••••">
            <button onclick="login()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg">Se Connecter</button>
        </section>

        <section id="form-section" class="hidden space-y-4 py-6">
            <div class="bg-blue-50 border-l-4 border-blue-600 p-4 rounded-r-2xl">
                <h3 id="dr-name" class="font-bold text-blue-900 text-lg"></h3>
                <p id="dr-role" class="text-xs text-blue-600 font-bold uppercase"></p>
                <p id="dr-structure" class="text-sm text-blue-700"></p>
            </div>

            <form id="main-form" class="space-y-4">
                <input type="hidden" id="auth-token">
                <div class="bg-white p-6 rounded-3xl shadow-sm space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500">Nbr. CONSULTATIONS</label>
                        <input type="number" name="consultation" class="w-full p-3 bg-gray-50 rounded-xl mt-1 outline-none font-bold" value="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">Nbr. HOSPITALISATION (6h max)</label>
                        <input type="number" name="hosp_6h" class="w-full p-3 bg-gray-50 rounded-xl mt-1 outline-none font-bold" value="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">Nbr. HOSPITALISATION</label>
                        <input type="number" name="hosp_normal" class="w-full p-3 bg-gray-50 rounded-xl mt-1 outline-none font-bold" value="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">Nbr. D’évacuations (1er trimestre)</label>
                        <input type="number" name="evacuations" class="w-full p-3 bg-gray-50 rounded-xl mt-1 outline-none font-bold" value="0">
                    </div>
                    <hr>
                    <div>
                        <label class="text-xs font-bold text-gray-500">Laboratoire (Nb. d'actes)</label>
                        <input type="number" name="labo" class="w-full p-3 bg-gray-50 rounded-xl mt-1 outline-none font-bold" value="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">Radiologie (Nb. d'actes)</label>
                        <input type="number" name="radio" class="w-full p-3 bg-gray-50 rounded-xl mt-1 outline-none font-bold" value="0">
                    </div>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold shadow-xl">Enregistrer les données</button>
            </form>
        </section>
    </main>

    <footer class="p-6 text-center text-gray-400 text-xs mt-auto">
        <p>Développé par <span class="font-bold text-gray-600 italic">Dev. Ing. Ferhat H.</span> | &copy; EPSP Berriane</p>
    </footer>

    <script>
        const API_URL = "https://orange.ferhathamza17.workers.dev";
        document.addEventListener('contextmenu', e => e.preventDefault());

        async function login() {
            const code = document.getElementById('user-code').value;
            try {
                const res = await fetch(API_URL + '/api/auth', { method: 'POST', body: JSON.stringify({ code }) });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('form-section').classList.remove('hidden');
                    document.getElementById('dr-name').innerText = data.user.name;
                    document.getElementById('dr-role').innerText = data.user.role;
                    document.getElementById('dr-structure').innerText = data.user.poly_name;
                    document.getElementById('auth-token').value = code;
                } else alert("Code invalide !");
            } catch (e) { alert("Erreur réseau"); }
        }

        document.getElementById('main-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "Envoi...";
            const body = Object.fromEntries(new FormData(e.target));
            body.code = document.getElementById('auth-token').value;
            const res = await fetch(API_URL + '/api/report', { method: 'POST', body: JSON.stringify(body) });
            if(res.ok) { alert("Enregistré avec succès !"); location.reload(); }
            else { alert("Erreur."); btn.disabled = false; btn.innerText = "Enregistrer"; }
        };
    </script>
</body>
</html>
